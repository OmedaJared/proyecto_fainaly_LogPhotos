<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer contraseña</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <section class="glass-card auth-card">
            <div class="auth-header">
                <div class="brand-mark">⟡</div>
                <div>
                    <h1>Restablecer contraseña</h1>
                    <p>Establece tu nueva contraseña y continúa con tu sesión segura.</p>
                </div>
            </div>

            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}

            <form class="auth-form" method="POST">
                <input type="password" name="password" placeholder="Nueva contraseña" required class="form-field">
                <button type="submit" class="btn btn-primary">Guardar nueva contraseña</button>
            </form>

            <div class="auth-footer">
                <a href="/login">Volver a iniciar sesión</a>
            </div>
        </section>
    </div>
</body>
</html>
